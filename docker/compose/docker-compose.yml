services:

  autoware-multi-object-tracker:
    image: ghcr.io/cgeller/autoware_multi_object_tracker:v0.51.0
    environment:
      # --- name ------
      NAMESPACE: /
      NAME: autoware_multi_object_tracker
      # --- other -----
      INPUT_OBJECT_LIST_TOPIC_01: ~/input/detection01/objects
      INPUT_OBJECT_LIST_TOPIC_02: ~/input/detection02/objects
      INPUT_OBJECT_LIST_TOPIC_03: ~/input/detection03/objects
      INPUT_OBJECT_LIST_TOPIC_04: ~/input/detection04/objects
      INPUT_OBJECT_LIST_TOPIC_05: ~/input/detection05/objects
      INPUT_OBJECT_LIST_TOPIC_06: ~/input/detection06/objects
      INPUT_OBJECT_LIST_TOPIC_07: ~/input/detection07/objects
      INPUT_OBJECT_LIST_TOPIC_08: ~/input/detection08/objects
      INPUT_OBJECT_LIST_TOPIC_09: ~/input/detection09/objects
      INPUT_OBJECT_LIST_TOPIC_10: ~/input/detection10/objects
      INPUT_OBJECT_LIST_TOPIC_11: ~/input/detection11/objects
      INPUT_OBJECT_LIST_TOPIC_12: ~/input/detection12/objects
      ODOMETRY_TOPIC: ~/input/odometry
      OBJECTS_TOPIC: ~/output/objects
      MERGED_OBJECTS_TOPIC: ~/output/merged_objects
      LOG_LEVEL: ${LOG_LEVEL:-info}
      USE_SIM_TIME: ${USE_SIM_TIME:-false}
      TRACKER_SETTING_PATH: ${TRACKER_SETTING_PATH:-}
      DATA_ASSOCIATION_MATRIX_PATH: ${DATA_ASSOCIATION_MATRIX_PATH:-}
      INPUT_CHANNELS_PATH: ${INPUT_CHANNELS_PATH:-}
      PUBLISH_MERGED_OBJECTS: ${PUBLISH_MERGED_OBJECTS:-false}
      EGO_SOURCE: ${EGO_SOURCE:-tf}
    command:
      - /bin/bash
      - -ic
      - |
        ros2 launch autoware_multi_object_tracker multi_object_tracker.launch.py \
          namespace:=$${NAMESPACE} \
          name:=$${NAME} \
          log_level:=$${LOG_LEVEL} \
          use_sim_time:=$${USE_SIM_TIME} \
          $${TRACKER_SETTING_PATH:+tracker_setting_path:=$${TRACKER_SETTING_PATH}} \
          $${DATA_ASSOCIATION_MATRIX_PATH:+data_association_matrix_path:=$${DATA_ASSOCIATION_MATRIX_PATH}} \
          $${INPUT_CHANNELS_PATH:+input_channels_path:=$${INPUT_CHANNELS_PATH}} \
          publish_merged_objects:=$${PUBLISH_MERGED_OBJECTS} \
          ego_source:=$${EGO_SOURCE} \
          input_object_list_topic_01:=$${INPUT_OBJECT_LIST_TOPIC_01} \
          input_object_list_topic_02:=$${INPUT_OBJECT_LIST_TOPIC_02} \
          input_object_list_topic_03:=$${INPUT_OBJECT_LIST_TOPIC_03} \
          input_object_list_topic_04:=$${INPUT_OBJECT_LIST_TOPIC_04} \
          input_object_list_topic_05:=$${INPUT_OBJECT_LIST_TOPIC_05} \
          input_object_list_topic_06:=$${INPUT_OBJECT_LIST_TOPIC_06} \
          input_object_list_topic_07:=$${INPUT_OBJECT_LIST_TOPIC_07} \
          input_object_list_topic_08:=$${INPUT_OBJECT_LIST_TOPIC_08} \
          input_object_list_topic_09:=$${INPUT_OBJECT_LIST_TOPIC_09} \
          input_object_list_topic_10:=$${INPUT_OBJECT_LIST_TOPIC_10} \
          input_object_list_topic_11:=$${INPUT_OBJECT_LIST_TOPIC_11} \
          input_object_list_topic_12:=$${INPUT_OBJECT_LIST_TOPIC_12} \
          odometry_topic:=$${ODOMETRY_TOPIC} \
          objects_topic:=$${OBJECTS_TOPIC} \
          merged_objects_topic:=$${MERGED_OBJECTS_TOPIC}

name: docker-ros

on:
  push:
    branches:
      - main
      - benchmark
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-ros:
    runs-on: ubuntu-latest
    steps:
      - uses: ika-rwth-aachen/docker-ros@main
        with:
          platform: amd64
          target: dev,run
          base-image: rwthika/ros2:jazzy
          rmw-implementation: rmw_zenoh_cpp
          enable-recursive-vcs-import: false
          command: ros2 launch autoware_multi_object_tracker multi_object_tracker.launch.xml
          label-maintainer: Raphael van Kempen <vankempen@thinking-cars.de>
          label-authors: Raphael van Kempen <vankempen@thinking-cars.de>
        env:
          TARGET_CMAKE_ARGS: -DCMAKE_EXPORT_COMPILE_COMMANDS=1
